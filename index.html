<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Utility Expenses</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root {
    --ink: #111827;
    --sub: #6B7280;
    --border: #D4D4D8;
    --bg-card: #FFFFFF;
    --bg-page: #F5F5F7;

    --total-dark: #3B0764;
    --total: #6D28D9;
    --total-light: #EDE9FE;

    --electricity: #F59E0B;
    --electricity-light: #FEF3C7;

    --water: #0072B2;
    --water-light: #DBEAFE;

    --internet: #009E73;
    --internet-light: #D8F5EA;

    --mobile: #CC79A7;
    --mobile-light: #FBE7F1;

    --true-c: #0F766E;
    --true-light: #CCFBF1;

    --balance-dark: #14532D;
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    margin: 0;
    padding: 0 0 40px;
    background: var(--bg-page);
    color: var(--ink);
  }
  .dashboard { max-width: 1040px; margin: 0 auto; display: flex; flex-direction: column; gap: 0; padding: 0 16px; }
  .app-flex { display: flex; flex-direction: column; gap: 26px; margin-top: 40px; }
  #overview { margin-top: 26px; }

  nav.topnav { position: sticky; top: 0; z-index: 30; background: var(--ink); padding: 0 16px; overflow-x: auto; white-space: nowrap; }
  nav.topnav .navwrap { max-width: 1040px; margin: 0 auto; display: flex; gap: 4px; }
  nav.topnav a { color: #D1D5DB; text-decoration: none; font-size: 13px; font-weight: 600; padding: 14px 12px; display: inline-flex; align-items: center; gap: 6px; border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s; }
  nav.topnav a svg { width: 14px; height: 14px; flex-shrink: 0; }
  nav.topnav a:hover, nav.topnav a:focus-visible { color: #FBBF24; border-color: #FBBF24; }

  .header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: baseline; gap: 8px; padding: 24px 4px 0; }
  .header h1 { font-size: 24px; font-weight: 700; margin: 0; letter-spacing: -0.01em; }
  .header span { font-size: 13px; color: var(--sub); }

  section, .card-section { scroll-margin-top: 60px; }

  .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 22px; box-shadow: 0 1px 3px rgba(17,24,39,0.05); }
  .section-eyebrow { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--sub); margin: 0 0 4px; }
  .section-title { display: flex; align-items: center; gap: 8px; font-size: 16px; font-weight: 700; margin: 0; }
  .section-title svg { width: 18px; height: 18px; flex-shrink: 0; }

  /* Filtered zone */
  .filtered-zone { background: #FAFAFF; border: 1px dashed #C7C3F0; border-radius: 20px; padding: 20px; display: flex; flex-direction: column; gap: 22px; }
  .filtered-zone-label { font-size: 12px; font-weight: 600; color: #6D28D9; margin: 0 0 4px; }
  .filter-bar { display: flex; flex-wrap: wrap; gap: 20px; align-items: center; }
  .filter-group { display: flex; flex-direction: column; gap: 4px; }
  .filter-group label { font-size: 11px; font-weight: 600; color: var(--sub); text-transform: uppercase; letter-spacing: 0.03em; }
  .filter-group select { font-family: inherit; font-size: 14px; padding: 8px 12px; border-radius: 10px; border: 1px solid var(--border); background: #FAFAFB; min-width: 140px; color: var(--ink); }
  .switch-row { display: flex; align-items: center; gap: 10px; margin-left: auto; }
  .switch-row .switch-label { font-size: 13px; font-weight: 500; color: var(--sub); }
  .switch { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; cursor: pointer; inset: 0; background: #D1D5DB; border-radius: 999px; transition: 0.2s; }
  .slider::before { content: ""; position: absolute; height: 18px; width: 18px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: 0.2s; }
  input:checked + .slider { background: var(--total); }
  input:checked + .slider::before { transform: translateX(20px); }

  /* Balance */
  .balance-card { background: var(--balance-dark); color: #fff; border-radius: 18px; padding: 24px 26px; display: flex; align-items: center; gap: 18px; }
  .balance-card .icon-wrap { width: 44px; height: 44px; border-radius: 12px; background: rgba(255,255,255,0.12); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .balance-card .icon-wrap svg { width: 22px; height: 22px; }
  .balance-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; opacity: 0.8; }
  .balance-value { font-size: 30px; font-weight: 700; margin-top: 4px; }
  .balance-sub { font-size: 12px; opacity: 0.65; margin-top: 4px; }

  /* BAN */
  .ban-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .ban-grid { display: grid; grid-template-columns: 1.3fr 1fr 1fr 1fr; gap: 14px; }
  .ban-card { position: relative; border-radius: 14px; padding: 18px; transition: transform 0.15s ease, box-shadow 0.15s ease; }
  .ban-card.clickable { cursor: pointer; }
  @media (prefers-reduced-motion: no-preference) {
    .ban-card.clickable:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(17,24,39,0.12); }
  }
  .ban-card.clickable:focus-visible { outline: 2px solid var(--total); outline-offset: 2px; }
  .ban-card .go-arrow { position: absolute; top: 14px; right: 14px; font-size: 13px; opacity: 0.55; }
  .ban-card .ban-icon { width: 18px; height: 18px; margin-bottom: 8px; opacity: 0.85; }
  .ban-card .ban-label { font-size: 12px; font-weight: 700; opacity: 0.8; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.03em; }
  .ban-card .ban-value { font-size: 22px; font-weight: 700; }
  .ban-card .ban-sub { font-size: 11px; opacity: 0.7; margin-top: 6px; }
  .ban-total { background: var(--total-dark); color: #FFFFFF; }
  .ban-total .ban-value { font-size: 32px; }
  .ban-electricity { background: var(--electricity-light); color: #7C2D12; }
  .ban-water { background: var(--water-light); color: #0C4A6E; }
  .ban-true { background: var(--true-light); color: #134E4A; }

  /* Charts */
  .chart-header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 16px; }
  .toggles { display: flex; gap: 8px; flex-wrap: wrap; }
  .toggle { border: none; border-radius: 999px; padding: 6px 14px; font-size: 12px; font-weight: 600; cursor: pointer; color: #4B5563; background: #F1F1F4; transition: opacity 0.15s ease, transform 0.15s ease; }
  .toggle:hover { transform: translateY(-1px); }
  .toggle.off { opacity: 0.35; }
  .t-overall { background: var(--total-light); color: var(--total-dark); }
  .t-electricity { background: var(--electricity-light); color: #7C2D12; }
  .t-water { background: var(--water-light); color: #0C4A6E; }
  .t-internet { background: var(--internet-light); color: #065F46; }
  .t-mobile { background: var(--mobile-light); color: #831843; }
  .t-true { background: var(--true-light); color: #134E4A; }
  .chart-container { height: 320px; }
  .chart-container.small { height: 260px; }

  /* YoY controls */
  .yoy-controls { display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-end; margin-bottom: 16px; }

  /* Table split layout */
  .table-split { display: flex; gap: 24px; align-items: flex-start; }
  .table-split .chart-pane { flex: 0 0 38%; min-width: 240px; }
  .table-split .table-pane { flex: 1; min-width: 0; }
  @media (max-width: 800px) {
    .table-split { flex-direction: column; }
    .table-split .chart-pane { flex: 1 1 auto; width: 100%; }
  }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.03em; color: var(--sub); font-weight: 700; padding: 8px 10px; border-bottom: 2px solid var(--border); position: sticky; top: 0; background: var(--bg-card); white-space: nowrap; }
  tbody td { padding: 9px 10px; border-bottom: 1px solid #EFEFF1; white-space: nowrap; }
  tbody tr:hover { background: #FAFAFB; }
  .table-scroll { max-height: 320px; overflow-y: auto; overflow-x: auto; border-radius: 10px; }
  .col-month { width: 100px; min-width: 100px; }
  .col-date { width: 120px; min-width: 120px; }
  #tblTelecom { min-width: 640px; }
  .num { text-align: right; font-variant-numeric: tabular-nums; }
  .link-cell a { color: var(--total); text-decoration: none; font-weight: 600; }
  .link-cell a:hover { text-decoration: underline; }
  .link-cell span { color: #C4C4CC; }
  .table-title { font-size: 15px; font-weight: 700; margin: 0 0 14px; display: flex; align-items: center; gap: 8px; }
  .table-title svg { width: 18px; height: 18px; }

  .status { font-size: 13px; color: var(--sub); padding: 40px 0; text-align: center; }

  @media (max-width: 700px) {
    .ban-grid { grid-template-columns: repeat(2, 1fr); }
    .ban-total { grid-column: span 2; }
    .switch-row { margin-left: 0; }
    .filter-bar { position: static; }
  }
</style>
</head>
<body>

<nav class="topnav">
  <div class="navwrap" id="navwrap"></div>
</nav>

<div class="dashboard">
  <div class="header">
    <h1>Family Utility Expenses</h1>
    <span id="rangeLabel">Loading...</span>
  </div>
  <div id="app" class="status">Fetching latest data...</div>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ5AI2tZWpEFtHFrtFJ_X0fvkqH7i6oGiVm0LDu2F8heW_7rDU7rhzVYe1bCAdjMYASgh6rpalUPTyK/pub?gid=0&single=true&output=csv";
const MONTH_ORDER = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const YOY_COLORS = ["#3B0764","#F59E0B","#0072B2","#009E73","#CC79A7","#0F766E","#831843","#4338CA"];

const ICONS = {
  wallet: '<path d="M3 7a2 2 0 0 1 2-2h13a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7Z"/><path d="M16 12h3"/><path d="M3 9h18"/>',
  bolt: '<path d="M13 2 4 14h6l-1 8 9-12h-6l1-8Z"/>',
  droplet: '<path d="M12 2s7 8.5 7 13a7 7 0 1 1-14 0c0-4.5 7-13 7-13Z"/>',
  wifi: '<path d="M2 8.5a16 16 0 0 1 20 0"/><path d="M5 12.5a11 11 0 0 1 14 0"/><path d="M8.5 16.5a6 6 0 0 1 7 0"/><circle cx="12" cy="20" r="1" fill="currentColor" stroke="none"/>',
  trendUp: '<path d="M3 17l6-6 4 4 8-8"/><path d="M15 7h6v6"/>',
  calendar: '<rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18"/><path d="M8 2v4"/><path d="M16 2v4"/>',
  barChart: '<path d="M4 20V10"/><path d="M10 20V4"/><path d="M16 20v-7"/><path d="M22 20H2"/>',
  activity: '<path d="M3 12h4l2 7 4-14 2 7h6"/>'
};
function icon(name, extra) {
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" ${extra||''}>${ICONS[name]}</svg>`;
}

function toNumber(val) {
  if (val === null || val === undefined || val === "") return null;
  const cleaned = String(val).replace(/,/g, "").trim();
  const n = parseFloat(cleaned);
  return isNaN(n) ? null : n;
}
function n0(v) { const x = toNumber(v); return x === null ? 0 : x; }
function fmt(v) { return v.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2}); }

document.getElementById('navwrap').innerHTML = `
  <a href="#balance">${icon('wallet')}Balance</a>
  <a href="#overview">${icon('trendUp')}Overview</a>
  <a href="#yoy">${icon('calendar')}Year Over Year</a>
  <a href="#trend">${icon('activity')}Trend</a>
  <a href="#breakdown">${icon('barChart')}Breakdown</a>
  <a href="#electricity">${icon('bolt')}Electricity</a>
  <a href="#water">${icon('droplet')}Water</a>
  <a href="#telecom">${icon('wifi')}Telecom</a>
`;

Papa.parse(CSV_URL, {
  download: true, header: false, skipEmptyLines: false,
  complete: function(results) {
    try {
      const raw = results.data;
      const headerRowIdx = raw.findIndex(row => (row[0] || "").trim() === "Month");
      if (headerRowIdx === -1) {
        document.getElementById('app').textContent = "Could not find a header row starting with 'Month'. Check the sheet layout.";
        return;
      }
      const headers = raw[headerRowIdx].map(h => (h || "").trim());
      const dataRows = raw.slice(headerRowIdx + 1)
        .filter(row => row.some(cell => (cell || "").trim() !== ""))
        .map(row => { const obj = {}; headers.forEach((h, i) => { obj[h] = row[i]; }); return obj; });
      buildDashboard(dataRows);
    } catch (e) {
      document.getElementById('app').textContent = "Something went wrong parsing the data: " + e.message;
    }
  },
  error: function() { document.getElementById('app').textContent = "Could not load data. Check the CSV_URL is set correctly."; }
});

function buildDashboard(raw) {
  const rows = raw
    .filter(r => toNumber(r["Total Utiliy Expense"]) !== null || toNumber(r["Total Utility Expense"]) !== null)
    .map(r => {
      const totalCol = r["Total Utiliy Expense"] !== undefined ? r["Total Utiliy Expense"] : r["Total Utility Expense"];
      const electricity = n0(r["Electricity Bill"]);
      const water = n0(r["Water Bill"]);
      const internet = n0(r["Internet Bill"]) + n0(r["Internet Bill (Add-On)"]) + n0(r["Internet VAT"]);
      const mobile = n0(r["Phone Bill"]) + n0(r["Phone Vat"]);
      const trueCombined = internet + mobile;
      const total = toNumber(totalCol) !== null ? toNumber(totalCol) : (electricity + water + trueCombined);
      const familyTransfer = n0(r["Family Transfer"]);
      const balance = toNumber(r["Balance"]);
      const month = (r["Month"] || "").trim();
      const year = (r["Year"] || "").trim();
      return {
        month, year, label: month + " " + year, monthIdx: MONTH_ORDER.indexOf(month),
        electricity, water, internet, mobile, trueCombined, total, familyTransfer, balance,
        eDate: r["E-Transfer Date"] || "", wDate: r["W-Transfer Date"] || "", iDate: r["I-Transfer Date"] || "",
        eUnit: r["E-Unit (kWh)"] || "", wUnit: r["W-Unit"] || "",
        eUnitNum: toNumber(r["E-Unit (kWh)"]), wUnitNum: toNumber(r["W-Unit"]),
        url: (r["URL"] || "").trim(), remark: r["Remark"] || ""
      };
    })
    .filter(r => r.month && r.year)
    .sort((a, b) => (parseInt(a.year) - parseInt(b.year)) || (a.monthIdx - b.monthIdx));

  if (!rows.length) { document.getElementById('app').textContent = "No rows with data found."; return; }

  document.getElementById('rangeLabel').textContent = rows.length + " months tracked \u00b7 " + rows[0].label + " \u2013 " + rows[rows.length - 1].label;

  const app = document.getElementById('app');
  app.className = 'app-flex';
  const latest = rows[rows.length - 1];
  const balanceSum = rows.reduce((s, r) => s + (r.balance !== null ? r.balance : 0), 0);

  app.innerHTML = `
    <section id="balance">
      <div class="balance-card">
        <div class="icon-wrap">${icon('wallet')}</div>
        <div>
          <div class="balance-label">All-Time Balance</div>
          <div class="balance-value">${fmt(balanceSum)} THB</div>
          <div class="balance-sub">Sum of the Balance column across all recorded months \u00b7 not affected by filters below</div>
        </div>
      </div>
    </section>

    <section id="overview" class="card">
      <div class="ban-header">
        <div><p class="section-eyebrow">Snapshot</p><h2 class="section-title">${icon('trendUp')}Overview</h2></div>
        <div class="switch-row" style="margin-left:0;">
          <span class="switch-label">Monthly</span>
          <label class="switch"><input type="checkbox" id="banToggle"><span class="slider"></span></label>
          <span class="switch-label">Yearly</span>
        </div>
      </div>
      <div class="ban-grid" id="banGrid"></div>
    </section>

    <section id="yoy" class="card">
      <p class="section-eyebrow">Compare</p>
      <h2 class="section-title">${icon('calendar')}Year Over Year</h2>
      <div class="yoy-controls" style="margin-top:16px;">
        <div class="filter-group">
          <label>Metric</label>
          <select id="yoyMetric">
            <option value="total">Total</option>
            <option value="electricity">Electricity</option>
            <option value="water">Water</option>
            <option value="trueCombined">True (Internet + Mobile)</option>
          </select>
        </div>
        <div class="filter-group"><label>From Year</label><select id="yoyFromYear"></select></div>
        <div class="filter-group"><label>To Year</label><select id="yoyToYear"></select></div>
      </div>
      <div class="chart-container"><canvas id="yoyChart"></canvas></div>
    </section>

    <div class="filtered-zone">
      <p class="filtered-zone-label">Filtered view \u2014 applies to Trend, Breakdown &amp; the tables below</p>
      <div class="filter-bar">
        <div class="filter-group"><label>From</label><select id="fromSel"></select></div>
        <div class="filter-group"><label>To</label><select id="toSel"></select></div>
        <div class="switch-row">
          <span class="switch-label">Combined</span>
          <label class="switch"><input type="checkbox" id="splitToggle" checked><span class="slider"></span></label>
          <span class="switch-label">Split (Internet / Mobile)</span>
        </div>
      </div>

      <section id="trend" class="card">
        <div class="chart-header">
          <div><p class="section-eyebrow">History</p><h2 class="section-title">${icon('activity')}Expense Trend</h2></div>
          <div class="toggles" id="lineToggles"></div>
        </div>
        <div class="chart-container"><canvas id="lineChart"></canvas></div>
      </section>

      <section id="breakdown" class="card">
        <div class="chart-header">
          <div><p class="section-eyebrow">Composition</p><h2 class="section-title">${icon('barChart')}Monthly Breakdown</h2></div>
          <div class="toggles" id="barToggles"></div>
        </div>
        <div class="chart-container"><canvas id="barChart"></canvas></div>
      </section>

      <section id="electricity" class="card">
        <p class="table-title">${icon('bolt', 'style="color:var(--electricity)"')}Electricity</p>
        <div class="table-split">
          <div class="chart-pane"><div class="chart-container small"><canvas id="miniElectricity"></canvas></div></div>
          <div class="table-pane"><div class="table-scroll"><table id="tblElectricity"></table></div></div>
        </div>
      </section>

      <section id="water" class="card">
        <p class="table-title">${icon('droplet', 'style="color:var(--water)"')}Water</p>
        <div class="table-split">
          <div class="chart-pane"><div class="chart-container small"><canvas id="miniWater"></canvas></div></div>
          <div class="table-pane"><div class="table-scroll"><table id="tblWater"></table></div></div>
        </div>
      </section>

      <section id="telecom" class="card">
        <p class="table-title">${icon('wifi', 'style="color:var(--true-c)"')}Telecom (Internet &amp; Mobile)</p>
        <div class="table-split">
          <div class="chart-pane"><div class="chart-container small"><canvas id="miniTelecom"></canvas></div></div>
          <div class="table-pane"><div class="table-scroll"><table id="tblTelecom"></table></div></div>
        </div>
      </section>
    </div>
  `;

  // ---- From/To dropdowns: descending order, default = current year Jan -> latest ----
  const fromSel = document.getElementById('fromSel');
  const toSel = document.getElementById('toSel');
  const descRows = rows.map((r, i) => ({ ...r, idx: i })).slice().reverse();
  descRows.forEach(r => {
    fromSel.innerHTML += `<option value="${r.idx}">${r.label}</option>`;
    toSel.innerHTML += `<option value="${r.idx}">${r.label}</option>`;
  });
  const currentYear = String(new Date().getFullYear());
  const curYearRows = rows.map((r, i) => ({ ...r, idx: i })).filter(r => r.year === currentYear);
  let defaultFrom = 0, defaultTo = rows.length - 1;
  if (curYearRows.length) { defaultFrom = curYearRows[0].idx; defaultTo = curYearRows[curYearRows.length - 1].idx; }
  fromSel.value = defaultFrom; toSel.value = defaultTo;

  const splitToggle = document.getElementById('splitToggle');
  const banToggle = document.getElementById('banToggle');
  let lineChart = null, barChart = null, yoyChart = null, miniE = null, miniW = null, miniT = null;
  const lineVisible = { overall: true, electricity: true, water: true, internet: true, mobile: true, trueCombined: true };
  const barVisible = { electricity: true, water: true, internet: true, mobile: true, trueCombined: true };

  function currentSlice() {
    const f = parseInt(fromSel.value), t = parseInt(toSel.value);
    const lo = Math.min(f, t), hi = Math.max(f, t);
    return rows.slice(lo, hi + 1);
  }

  function goTo(id) { document.getElementById(id).scrollIntoView({ behavior: 'smooth', block: 'start' }); }

  function renderBANs() {
    const yearly = banToggle.checked;
    let total, electricity, water, trueCombined, subLabel;
    if (!yearly) {
      total = latest.total; electricity = latest.electricity; water = latest.water; trueCombined = latest.trueCombined;
      subLabel = latest.label;
    } else {
      const yr = latest.year;
      const yearRows = rows.filter(r => r.year === yr);
      total = yearRows.reduce((s, r) => s + r.total, 0);
      electricity = yearRows.reduce((s, r) => s + r.electricity, 0);
      water = yearRows.reduce((s, r) => s + r.water, 0);
      trueCombined = yearRows.reduce((s, r) => s + r.trueCombined, 0);
      subLabel = "Year to date, " + yr;
    }
    document.getElementById('banGrid').innerHTML = `
      <div class="ban-card ban-total clickable" data-target="trend" tabindex="0" role="button" aria-label="Go to trend section">
        <span class="go-arrow">\u2192</span>${icon('trendUp','class="ban-icon"')}
        <div class="ban-label">Total</div><div class="ban-value">${fmt(total)}</div><div class="ban-sub">${subLabel}</div>
      </div>
      <div class="ban-card ban-electricity clickable" data-target="electricity" tabindex="0" role="button" aria-label="Go to electricity section">
        <span class="go-arrow">\u2192</span>${icon('bolt','class="ban-icon"')}
        <div class="ban-label">Electricity</div><div class="ban-value">${fmt(electricity)}</div><div class="ban-sub">${subLabel}</div>
      </div>
      <div class="ban-card ban-water clickable" data-target="water" tabindex="0" role="button" aria-label="Go to water section">
        <span class="go-arrow">\u2192</span>${icon('droplet','class="ban-icon"')}
        <div class="ban-label">Water</div><div class="ban-value">${fmt(water)}</div><div class="ban-sub">${subLabel}</div>
      </div>
      <div class="ban-card ban-true clickable" data-target="telecom" tabindex="0" role="button" aria-label="Go to telecom section">
        <span class="go-arrow">\u2192</span>${icon('wifi','class="ban-icon"')}
        <div class="ban-label">True</div><div class="ban-value">${fmt(trueCombined)}</div><div class="ban-sub">${subLabel}</div>
      </div>
    `;
    document.querySelectorAll('.ban-card.clickable').forEach(el => {
      const go = () => goTo(el.dataset.target);
      el.addEventListener('click', go);
      el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); go(); } });
    });
  }

  function seriesForMode(split) {
    const base = [
      { key: "overall", label: "Overall", color: "#6D28D9", getVal: r => r.total },
      { key: "electricity", label: "Electricity", color: "#F59E0B", getVal: r => r.electricity },
      { key: "water", label: "Water", color: "#0072B2", getVal: r => r.water }
    ];
    if (split) {
      base.push({ key: "internet", label: "Internet", color: "#009E73", getVal: r => r.internet });
      base.push({ key: "mobile", label: "Mobile", color: "#CC79A7", getVal: r => r.mobile });
    } else {
      base.push({ key: "trueCombined", label: "True", color: "#0F766E", getVal: r => r.trueCombined });
    }
    return base;
  }

  function renderLineToggles(series) {
    const row = document.getElementById('lineToggles');
    row.innerHTML = '';
    series.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'toggle t-' + s.key + (lineVisible[s.key] === false ? ' off' : '');
      btn.textContent = s.label;
      btn.addEventListener('click', () => {
        lineVisible[s.key] = !lineVisible[s.key];
        btn.classList.toggle('off', !lineVisible[s.key]);
        if (lineChart) {
          const idx = lineChart.data.datasets.findIndex(d => d._key === s.key);
          if (idx > -1) { lineChart.getDatasetMeta(idx).hidden = !lineVisible[s.key]; lineChart.update(); }
        }
      });
      row.appendChild(btn);
    });
  }

  function renderCharts() {
    const slice = currentSlice();
    const split = splitToggle.checked;
    const series = seriesForMode(split);
    renderLineToggles(series);
    const labels = slice.map(r => r.label);

    if (lineChart) lineChart.destroy();
    lineChart = new Chart(document.getElementById('lineChart'), {
      type: 'line',
      data: { labels, datasets: series.map(s => ({
        _key: s.key, label: s.label, data: slice.map(s.getVal),
        borderColor: s.color, backgroundColor: s.color, borderWidth: 1.5,
        pointRadius: 2, pointHoverRadius: 5, tension: 0.3, fill: false,
        hidden: lineVisible[s.key] === false
      })) },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: { backgroundColor: '#111827', padding: 10, callbacks: { label: ctx => ctx.dataset.label + ': ' + fmt(ctx.parsed.y) + ' THB' } }
        },
        scales: {
          x: { ticks: { font: { size: 10 }, color: '#6B7280', maxRotation: 60, minRotation: 45 }, grid: { display: false } },
          y: { ticks: { font: { size: 11 }, color: '#6B7280' }, grid: { color: '#EFEFF1' } }
        }
      }
    });

    const barSeries = split
      ? [
          { key: "electricity", label: "Electricity", color: "#F59E0B", getVal: r => r.electricity },
          { key: "water", label: "Water", color: "#0072B2", getVal: r => r.water },
          { key: "internet", label: "Internet", color: "#009E73", getVal: r => r.internet },
          { key: "mobile", label: "Mobile", color: "#CC79A7", getVal: r => r.mobile }
        ]
      : [
          { key: "electricity", label: "Electricity", color: "#F59E0B", getVal: r => r.electricity },
          { key: "water", label: "Water", color: "#0072B2", getVal: r => r.water },
          { key: "trueCombined", label: "True", color: "#0F766E", getVal: r => r.trueCombined }
        ];

    const barToggleRow = document.getElementById('barToggles');
    barToggleRow.innerHTML = '';
    barSeries.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'toggle t-' + s.key + (barVisible[s.key] === false ? ' off' : '');
      btn.textContent = s.label;
      btn.addEventListener('click', () => {
        barVisible[s.key] = !barVisible[s.key];
        btn.classList.toggle('off', !barVisible[s.key]);
        if (barChart) {
          const idx = barChart.data.datasets.findIndex(d => d._key === s.key);
          if (idx > -1) { barChart.getDatasetMeta(idx).hidden = !barVisible[s.key]; barChart.update(); }
        }
      });
      barToggleRow.appendChild(btn);
    });

    if (barChart) barChart.destroy();
    barChart = new Chart(document.getElementById('barChart'), {
      type: 'bar',
      data: { labels, datasets: barSeries.map(s => ({ _key: s.key, label: s.label, data: slice.map(s.getVal), backgroundColor: s.color, hidden: barVisible[s.key] === false })) },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { backgroundColor: '#111827', padding: 10, callbacks: {
            label: ctx => {
              const chart = ctx.chart;
              let monthTotal = 0;
              chart.data.datasets.forEach((ds, i) => { if (!chart.getDatasetMeta(i).hidden) monthTotal += (ds.data[ctx.dataIndex] || 0); });
              const pct = monthTotal > 0 ? ((ctx.parsed.y / monthTotal) * 100).toFixed(1) : '0.0';
              return ctx.dataset.label + ': ' + fmt(ctx.parsed.y) + ' THB (' + pct + '%)';
            }
          } }
        },
        scales: {
          x: { stacked: true, ticks: { font: { size: 10 }, color: '#374151', maxRotation: 60, minRotation: 45 }, grid: { display: false } },
          y: { stacked: true, ticks: { font: { size: 11 }, color: '#374151' }, grid: { color: '#E5E7EB' } }
        }
      }
    });

    if (miniE) miniE.destroy();
    miniE = new Chart(document.getElementById('miniElectricity'), {
      type: 'line',
      data: { labels, datasets: [
        { label: 'Amount (THB)', data: slice.map(r => r.electricity), borderColor: '#F59E0B', backgroundColor: '#F59E0B', yAxisID: 'y', borderWidth: 1.5, pointRadius: 2, pointHoverRadius: 4, tension: 0.3 },
        { label: 'Units (kWh)', data: slice.map(r => r.eUnitNum), borderColor: '#92400E', backgroundColor: '#92400E', yAxisID: 'y1', borderWidth: 1.5, borderDash: [4, 3], pointRadius: 2, pointHoverRadius: 4, tension: 0.3 }
      ] },
      options: { responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false },
        plugins: { legend: { position: 'bottom', labels: { boxWidth: 4, boxHeight: 4, pointStyleWidth: 4, usePointStyle: true, pointStyle: 'circle', font: { size: 9 } } }, tooltip: { backgroundColor: '#111827' } },
        scales: {
          x: { ticks: { font: { size: 9 }, color: '#6B7280', maxRotation: 60, minRotation: 45 }, grid: { display: false } },
          y: { position: 'left', ticks: { font: { size: 9 }, color: '#B45309' }, grid: { color: '#EFEFF1' }, title: { display: true, text: 'THB', font: { size: 9 } } },
          y1: { position: 'right', ticks: { font: { size: 9 }, color: '#92400E' }, grid: { drawOnChartArea: false }, title: { display: true, text: 'kWh', font: { size: 9 } } }
        } }
    });

    if (miniW) miniW.destroy();
    miniW = new Chart(document.getElementById('miniWater'), {
      type: 'line',
      data: { labels, datasets: [
        { label: 'Amount (THB)', data: slice.map(r => r.water), borderColor: '#0072B2', backgroundColor: '#0072B2', yAxisID: 'y', borderWidth: 1.5, pointRadius: 2, pointHoverRadius: 4, tension: 0.3 },
        { label: 'Units', data: slice.map(r => r.wUnitNum), borderColor: '#164E63', backgroundColor: '#164E63', yAxisID: 'y1', borderWidth: 1.5, borderDash: [4, 3], pointRadius: 2, pointHoverRadius: 4, tension: 0.3 }
      ] },
      options: { responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false },
        plugins: { legend: { position: 'bottom', labels: { boxWidth: 4, boxHeight: 4, pointStyleWidth: 4, usePointStyle: true, pointStyle: 'circle', font: { size: 9 } } }, tooltip: { backgroundColor: '#111827' } },
        scales: {
          x: { ticks: { font: { size: 9 }, color: '#6B7280', maxRotation: 60, minRotation: 45 }, grid: { display: false } },
          y: { position: 'left', ticks: { font: { size: 9 }, color: '#0072B2' }, grid: { color: '#EFEFF1' }, title: { display: true, text: 'THB', font: { size: 9 } } },
          y1: { position: 'right', ticks: { font: { size: 9 }, color: '#164E63' }, grid: { drawOnChartArea: false }, title: { display: true, text: 'Units', font: { size: 9 } } }
        } }
    });

    if (miniT) miniT.destroy();
    miniT = new Chart(document.getElementById('miniTelecom'), {
      type: 'line',
      data: { labels, datasets: [
        { label: 'Internet', data: slice.map(r => r.internet), borderColor: '#009E73', backgroundColor: '#009E73', borderWidth: 1.5, pointRadius: 2, pointHoverRadius: 4, tension: 0.3 },
        { label: 'Mobile', data: slice.map(r => r.mobile), borderColor: '#CC79A7', backgroundColor: '#CC79A7', borderWidth: 1.5, pointRadius: 2, pointHoverRadius: 4, tension: 0.3 }
      ] },
      options: { responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false },
        plugins: { legend: { position: 'bottom', labels: { boxWidth: 4, boxHeight: 4, pointStyleWidth: 4, usePointStyle: true, pointStyle: 'circle', font: { size: 9 } } }, tooltip: { backgroundColor: '#111827' } },
        scales: { x: { ticks: { font: { size: 9 }, color: '#6B7280', maxRotation: 60, minRotation: 45 }, grid: { display: false } }, y: { ticks: { font: { size: 9 }, color: '#6B7280' }, grid: { color: '#EFEFF1' }, title: { display: true, text: 'THB', font: { size: 9 } } } } }
    });
  }

  function linkCell(url) {
    if (!url) return '<span>&mdash;</span>';
    const safe = url.startsWith('http') ? url : ('https://' + url);
    return `<a href="${safe}" target="_blank" rel="noopener">Open folder</a>`;
  }

  function renderTables() {
    const slice = currentSlice().slice().reverse();
    document.getElementById('tblElectricity').innerHTML = `
      <thead><tr><th class="col-month">Month</th><th class="col-date">Transfer date</th><th class="num">Units (kWh)</th><th class="num">Amount (THB)</th><th>Link</th></tr></thead>
      <tbody>${slice.map(r => `<tr><td class="col-month">${r.label}</td><td class="col-date">${r.eDate || '&mdash;'}</td><td class="num">${r.eUnit || '&mdash;'}</td><td class="num">${fmt(r.electricity)}</td><td class="link-cell">${linkCell(r.url)}</td></tr>`).join('')}</tbody>`;
    document.getElementById('tblWater').innerHTML = `
      <thead><tr><th class="col-month">Month</th><th class="col-date">Transfer date</th><th class="num">Units</th><th class="num">Amount (THB)</th><th>Link</th></tr></thead>
      <tbody>${slice.map(r => `<tr><td class="col-month">${r.label}</td><td class="col-date">${r.wDate || '&mdash;'}</td><td class="num">${r.wUnit || '&mdash;'}</td><td class="num">${fmt(r.water)}</td><td class="link-cell">${linkCell(r.url)}</td></tr>`).join('')}</tbody>`;
    document.getElementById('tblTelecom').innerHTML = `
      <thead><tr><th class="col-month">Month</th><th class="col-date">Transfer date</th><th class="num">Internet (THB)</th><th class="num">Mobile (THB)</th><th class="num">Total (THB)</th><th>Link</th></tr></thead>
      <tbody>${slice.map(r => `<tr><td class="col-month">${r.label}</td><td class="col-date">${r.iDate || '&mdash;'}</td><td class="num">${fmt(r.internet)}</td><td class="num">${fmt(r.mobile)}</td><td class="num">${fmt(r.trueCombined)}</td><td class="link-cell">${linkCell(r.url)}</td></tr>`).join('')}</tbody>`;
  }

  // ---- Year over Year ----
  const years = [...new Set(rows.map(r => r.year))].sort();
  const yoyMetricSel = document.getElementById('yoyMetric');
  const yoyFromSel = document.getElementById('yoyFromYear');
  const yoyToSel = document.getElementById('yoyToYear');
  years.forEach(y => {
    yoyFromSel.innerHTML += `<option value="${y}">${y}</option>`;
    yoyToSel.innerHTML += `<option value="${y}">${y}</option>`;
  });
  const curYearNum = new Date().getFullYear();
  const desiredFromYear = String(curYearNum - 3);
  yoyFromSel.value = years.includes(desiredFromYear) ? desiredFromYear : years[0];
  yoyToSel.value = years.includes(String(curYearNum)) ? String(curYearNum) : years[years.length - 1];

  function renderYoY() {
    const metric = yoyMetricSel.value;
    const yFrom = yoyFromSel.value, yTo = yoyToSel.value;
    const selectedYears = years.filter(y => y >= yFrom && y <= yTo);
    const datasets = selectedYears.map((y, i) => {
      const yearData = MONTH_ORDER.map(m => { const row = rows.find(r => r.year === y && r.month === m); return row ? row[metric] : null; });
      return { label: y, data: yearData, borderColor: YOY_COLORS[i % YOY_COLORS.length], backgroundColor: YOY_COLORS[i % YOY_COLORS.length],
        borderWidth: 1.5, pointRadius: 2, pointHoverRadius: 5, tension: 0.3, fill: false, spanGaps: true };
    });
    if (yoyChart) yoyChart.destroy();
    yoyChart = new Chart(document.getElementById('yoyChart'), {
      type: 'line',
      data: { labels: MONTH_ORDER, datasets },
      options: {
        responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { position: 'bottom', labels: { boxWidth: 5, boxHeight: 5, pointStyleWidth: 5, usePointStyle: true, pointStyle: 'circle', font: { size: 11 }, color: '#111827' } },
          tooltip: { backgroundColor: '#111827', padding: 10, callbacks: { label: ctx => ctx.dataset.label + ': ' + fmt(ctx.parsed.y) + ' THB' } }
        },
        scales: { x: { ticks: { font: { size: 11 }, color: '#6B7280' }, grid: { display: false } }, y: { ticks: { font: { size: 11 }, color: '#6B7280' }, grid: { color: '#EFEFF1' } } }
      }
    });
  }

  function renderAll() { renderCharts(); renderTables(); }

  fromSel.addEventListener('change', renderAll);
  toSel.addEventListener('change', renderAll);
  splitToggle.addEventListener('change', renderAll);
  banToggle.addEventListener('change', renderBANs);
  yoyMetricSel.addEventListener('change', renderYoY);
  yoyFromSel.addEventListener('change', renderYoY);
  yoyToSel.addEventListener('change', renderYoY);

  renderBANs();
  renderAll();
  renderYoY();
}
</script>
</body>
</html>
