<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Expense Log</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    margin: 0; min-height: 100vh; background: #F5F5F7; color: #111827;
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .wrap { max-width: 720px; width: 100%; }
  .wrap h1 { font-size: 26px; font-weight: 700; text-align: center; margin: 0 0 6px; }
  .wrap p.sub { text-align: center; color: #6B7280; font-size: 14px; margin: 0 0 32px; }
  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 600px) { .cards { grid-template-columns: 1fr; } }
  a.card {
    text-decoration: none; color: inherit; border-radius: 18px; padding: 24px;
    display: flex; flex-direction: column; gap: 10px; transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: 0 1px 3px rgba(17,24,39,0.08);
  }
  a.card:hover { transform: translateY(-3px); box-shadow: 0 10px 24px rgba(17,24,39,0.14); }
  .card.utility { background: #FEF3C7; color: #7C2D12; }
  .card.trip { background: #EDE9FE; color: #3B0764; }
  .card .icon-wrap { width: 40px; height: 40px; border-radius: 10px; background: rgba(255,255,255,0.5); display: flex; align-items: center; justify-content: center; }
  .card .icon-wrap svg { width: 20px; height: 20px; }
  .card h2 { font-size: 17px; font-weight: 700; margin: 4px 0 0; }
  .card .meta { font-size: 12px; opacity: 0.8; }
  .card .meta.loading { opacity: 0.5; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Family Expense Log</h1>
  <p class="sub">Choose a dashboard to open</p>
  <div class="cards">
    <a class="card utility" href="utility.html">
      <div class="icon-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2 4 14h6l-1 8 9-12h-6l1-8Z"/></svg></div>
      <h2>Utility Expense</h2>
      <div class="meta loading" id="utilityMeta">Loading summary...</div>
    </a>
    <a class="card trip" href="trip.html">
      <div class="icon-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></div>
      <h2>Trip Expense</h2>
      <div class="meta loading" id="tripMeta">Loading summary...</div>
    </a>
  </div>
</div>

<script>
const UTILITY_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ5AI2tZWpEFtHFrtFJ_X0fvkqH7i6oGiVm0LDu2F8heW_7rDU7rhzVYe1bCAdjMYASgh6rpalUPTyK/pub?gid=0&single=true&output=csv";
const TRIP_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQ5AI2tZWpEFtHFrtFJ_X0fvkqH7i6oGiVm0LDu2F8heW_7rDU7rhzVYe1bCAdjMYASgh6rpalUPTyK/pub?gid=1933853322&single=true&output=csv";

function toNumber(val) { if (!val) return null; const n = parseFloat(String(val).replace(/,/g, "").trim()); return isNaN(n) ? null : n; }
function fmt(v) { return v.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

Papa.parse(UTILITY_CSV, {
  download: true, header: false, skipEmptyLines: false,
  complete: function(results) {
    const raw = results.data;
    const idx = raw.findIndex(row => (row[0] || "").trim() === "Month");
    if (idx === -1) { document.getElementById('utilityMeta').textContent = "Open dashboard"; return; }
    const headers = raw[idx].map(h => (h || "").trim());
    const rows = raw.slice(idx + 1).filter(r => r.some(c => (c||"").trim() !== "")).map(r => { const o = {}; headers.forEach((h,i)=>o[h]=r[i]); return o; });
    const valid = rows.filter(r => toNumber(r["Total Utiliy Expense"]) !== null);
    if (!valid.length) { document.getElementById('utilityMeta').textContent = "Open dashboard"; return; }
    const latest = valid[valid.length - 1];
    const bal = toNumber(latest["Balance"]);
    document.getElementById('utilityMeta').textContent = valid.length + " months tracked \u00b7 latest balance " + (bal !== null ? fmt(bal) + ' THB' : 'N/A');
  },
  error: function() { document.getElementById('utilityMeta').textContent = "Open dashboard"; }
});

Papa.parse(TRIP_CSV, {
  download: true, header: false, skipEmptyLines: false,
  complete: function(results) {
    const raw = results.data;
    const idx = raw.findIndex(row => (row[0] || "").trim() === "Trip Name");
    if (idx === -1) { document.getElementById('tripMeta').textContent = "Open dashboard"; return; }
    const headers = raw[idx].map(h => (h || "").trim());
    const rows = raw.slice(idx + 1).filter(r => r.some(c => (c||"").trim() !== "")).map(r => { const o = {}; headers.forEach((h,i)=>o[h]=r[i]); return o; });
    const names = new Set(rows.map(r => r["Trip Name"]).filter(Boolean));
    document.getElementById('tripMeta').textContent = names.size + " trip" + (names.size === 1 ? '' : 's') + " recorded";
  },
  error: function() { document.getElementById('tripMeta').textContent = "Open dashboard"; }
});
</script>
</body>
</html>
